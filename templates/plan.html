{% extends "base.html" %}
{% block content %}

<style>

.plan-wrapper{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    min-height:85vh;
    flex-wrap:wrap;
}

.plan-card{
    background:rgba(0,0,0,0.75);
    backdrop-filter:blur(25px);
    padding:35px;
    border-radius:20px;
    width:420px;
    color:white;
    text-align:center;
    box-shadow:0 15px 50px rgba(0,0,0,0.6);
    transition:0.3s;
}

.plan-card:hover{
    transform:translateY(-6px);
}

/* TITLE WITH ICON */

.plan-title{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px;
    margin-bottom:20px;
}

.plan-title i{
    font-size:26px;
    color:#00f2ff;
}

.plan-title h2{
    margin:0;
}

/* INPUTS */

.input-group{
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    outline:none;
}

/* PREMIUM BUTTON */

.plan-card button{
    width:100%;
    padding:13px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:linear-gradient(45deg,#00f2ff,#4facfe);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.plan-card button:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(0,242,255,0.5);
}

.slider-value{
    font-size:14px;
    color:#00f2ff;
}

input[type=range]{
    width:100%;
}

</style>

<div class="plan-wrapper">


<!-- ================= AI PLANNER ================= -->

<div class="plan-card">

<div class="plan-title">
<i class="fa-solid fa-robot"></i>
<h2>AI Trip Planner</h2>
</div>

<form method="POST">
{% csrf_token %}
<input type="hidden" name="action" value="normal">

<div class="input-group">
<input type="text" name="destination"
placeholder="Destination (e.g. Paris)" required>
</div>

<div class="input-group">
<label>Budget: $<span id="budgetValue1">1000</span></label>
<input type="range" name="budget" min="200" max="10000"
value="1000" step="100" id="budgetSlider1">
<div class="slider-value">Adjust your budget</div>
</div>

<div class="input-group">
<input type="date" name="start_date" required>
</div>

<div class="input-group">
<input type="date" name="end_date" required>
</div>

<button type="submit">
Generate AI Itinerary
</button>

</form>

</div>



<!-- ================= SMART EXPLORER ================= -->

<div class="plan-card">

<div class="plan-title">
<i class="fa-solid fa-compass"></i>
<h2>Smart Explorer</h2>
</div>

<form method="POST">
{% csrf_token %}
<input type="hidden" name="action" value="advanced">

<div class="input-group">
<input type="text" name="city"
placeholder="Destination (e.g. Bangalore)" required>
</div>

<div class="input-group">
<label>Budget: ₹<span id="budgetValue2">1000</span></label>
<input type="range" name="budget" min="1000" max="100000"
value="1000" step="500" id="budgetSlider2">
<div class="slider-value">Adjust your budget</div>
</div>

<div class="input-group">
<input type="date" name="start_date" required>
</div>

<div class="input-group">
<input type="date" name="end_date" required>
</div>

<button type="submit">
Explore in Google Maps
</button>

</form>

</div>

</div>

{% if google_maps_url %}
<script>
window.open("{{ google_maps_url }}", "_blank");
</script>
{% endif %}

<script>

const slider1 = document.getElementById("budgetSlider1");
const output1 = document.getElementById("budgetValue1");

slider1.oninput = function(){
output1.innerHTML = this.value;
}

const slider2 = document.getElementById("budgetSlider2");
const output2 = document.getElementById("budgetValue2");

slider2.oninput = function(){
output2.innerHTML = this.value;
}

</script>

{% endblock %}
