{% extends "base.html" %}
{% block content %}

<style>

.preview-container{
max-width:1200px;
margin:auto;
padding-top:40px;
}

.preview-title{
text-align:center;
margin-bottom:40px;
}

.preview-title h2{
font-size:32px;
color:#00f2ff;
}

.trip-card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
padding:20px;
margin-bottom:40px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
position:relative;
}

.delete-btn{
position:absolute;
top:15px;
right:15px;
background:red;
color:white;
border:none;
border-radius:50%;
width:35px;
height:35px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

.delete-btn:hover{
transform:scale(1.1);
}

.trip-info{
text-align:center;
margin-bottom:20px;
}

.trip-info h3{
font-size:24px;
color:#00f2ff;
}

.image-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.image-card{
overflow:hidden;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:0.3s;
background:white;
}

.image-card img{
width:100%;
height:250px;
object-fit:cover;
}

.image-card:hover{
transform:scale(1.05);
}

</style>

<div class="preview-container">

<div class="preview-title">
<h2>My Saved Trips</h2>
</div>

{% for trip in trips %}

<div class="trip-card">

<form action="{% url 'delete_trip' trip.id %}" method="POST">
{% csrf_token %}
<button class="delete-btn">🗑</button>
</form>

<div class="trip-info">
<h3>{{ trip.destination }}</h3>
<p>Budget: {{ trip.budget }}</p>
<p>Days: {{ trip.days }}</p>
</div>

<div class="image-grid">

{% for img in trip.images.all %}

<div class="image-card">
<img src="{{ img.image_url }}">
</div>

{% endfor %}

</div>

</div>

{% empty %}

<h2 style="text-align:center">No trips saved yet.</h2>

{% endfor %}

</div>

{% endblock %}
