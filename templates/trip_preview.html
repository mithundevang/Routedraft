{% extends "base.html" %}
{% block content %}

<style>

.preview-container{
max-width:1200px;
margin:auto;
padding-top:40px;
}

.preview-title{
text-align:center;
margin-bottom:40px;
}

.preview-title h2{
font-size:32px;
color:#00f2ff;
}

.image-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.image-card{
overflow:hidden;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
transition:0.3s;
background:white;
}

.image-card img{
width:100%;
height:250px;
object-fit:cover;
}

.image-card:hover{
transform:scale(1.05);
}

.place-name{
text-align:center;
margin:10px 0 15px 0;
font-weight:bold;
font-size:16px;
color:#333;
}

.save-btn{
display:block;
margin:40px auto;
padding:15px 40px;
border:none;
border-radius:30px;
background:linear-gradient(45deg,#00f2ff,#4facfe);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.save-btn:hover{
box-shadow:0 10px 25px rgba(0,242,255,0.5);
}

</style>

<div class="preview-container">

{% if error %}

<h2 style="text-align:center">{{ error }}</h2>

{% else %}

<div class="preview-title">
<h2>{{ destination }} Destination Preview</h2>
<p>Explore your destination before saving the trip</p>
</div>

<div class="image-grid">

{% for img in images %}

<div class="image-card">

<img src="{{ img.url }}">

<p class="place-name">
{{ img.title|title }}
</p>

</div>

{% endfor %}

</div>

<form action="{% url 'save_trip' %}" method="POST">
    {% csrf_token %}
    <button type="submit" class="save-btn">
        Save Trip
    </button>
</form>

{% endif %}

</div>

{% endblock %}
